<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulary Origin</title>
    <link
      rel="icon"
      href="/assets/image/imag-trading.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="/styles/global.css" />
    <link rel="stylesheet" href="/styles/formulario.css" />
  </head>
  <body>
    <header>
      <img
        src="/assets/image/imag-trading.png"
        alt="Un hombre mirando a una ventana con un gráfico de trading de fondo"
      />
      <h1>Formulary Origin</h1>
    </header>

    <main>
      <section class="form">
        <form>
          <label>
            Nombre de usuario:
            <input
              type="text"
              name="username"
              placeholder="Maquina del Mal 2.0"
              required
            />
          </label>
          <label>
            Nombres:
            <input
              type="text"
              name="nombre"
              placeholder="Ibar Exequiel"
              required
            />
          </label>
          <label>
            Apellido(s):
            <input type="text" name="apellido" placeholder="Caubet" required />
          </label>
          <label>
            Contraseña:
            <input
              type="password"
              name="contrasena"
              placeholder="Contraseña"
              minlength="8"
              required
            />
          </label>
          <label>
            Correo electrónico:
            <input
              type="email"
              name="correo_electronico"
              placeholder="ejemplo@ejemplo.com"
              required
            />
          </label>
          <label>
            <input type="submit" value="ENVIAR" />
          </label>
        </form>
      </section>
    </main>

    <footer class="container">
      <ul class="social-icon">
        <li class="icon-elem">
          <a href="#" class="icon">
            <ion-icon name="logo-youtube"></ion-icon>
          </a>
        </li>
        <li class="icon-elem">
          <a href="#" class="icon">
            <ion-icon name="logo-facebook"></ion-icon>
          </a>
        </li>
        <li class="icon-elem">
          <a href="#" class="icon">
            <ion-icon name="logo-instagram"></ion-icon>
          </a>
        </li>
        <li class="icon-elem">
          <a href="#" class="icon">
            <ion-icon name="mail-outline"></ion-icon>
          </a>
        </li>
        <li class="icon-elem">
          <a href="#" class="icon">
            <ion-icon name="logo-whatsapp"></ion-icon>
          </a>
        </li>
      </ul>
      <ul class="menu">
        <li class="menu-element">
          <a href="index.html" class="menu-icon">Trading</a>
        </li>
        <li class="menu-element">
          <a href="scalping.html" class="menu-icon">Scalping</a>
        </li>
      </ul>
      <p class="text">@2024 | Trading in the World</p>
    </footer>

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
